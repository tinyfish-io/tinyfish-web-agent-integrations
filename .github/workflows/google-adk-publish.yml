name: Google ADK Publish

on:
  push:
    tags:
      - "google-adk-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/google-adk-v')
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: google-adk

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade pip build

      - run: python -m build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: google-adk/dist
